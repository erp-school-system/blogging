<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Google Publisher Tag Test Ads -->
    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
    <script>
      window.googletag = window.googletag || { cmd: [] };
      googletag.cmd.push(function () {
        googletag
          .defineSlot("/6355419/Travel/Europe/France/Paris", [728, 90], "div-gpt-ad-top-banner")
          .addService(googletag.pubads());

        googletag
          .defineSlot("/6355419/Travel/Europe/France/Paris", [728, 90], "div-gpt-ad-bottom-banner")
          .addService(googletag.pubads());

        googletag
          .defineSlot("/6355419/Travel/Europe/France/Paris", [300, 250], "div-gpt-ad-sidebar")
          .addService(googletag.pubads());

        googletag
          .defineSlot("/6355419/Travel/Europe/France/Paris", [300, 250], "div-gpt-ad-incontent-1")
          .addService(googletag.pubads());

        googletag
          .defineSlot("/6355419/Travel/Europe/France/Paris", [300, 250], "div-gpt-ad-incontent-2")
          .addService(googletag.pubads());

        googletag
          .defineSlot("/6355419/Travel/Europe/France/Paris", [728, 90], "div-gpt-ad-sticky-footer")
          .addService(googletag.pubads());

        googletag.pubads().enableSingleRequest();
        googletag.enableServices();
      });
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blogging Web App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
